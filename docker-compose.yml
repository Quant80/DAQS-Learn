services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: daqs
      POSTGRES_PASSWORD: daqs_password
      POSTGRES_DB: daqs_learn
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daqs"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - path: ./backend/.env
        required: false
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://daqs:daqs_password@db:5432/daqs_learn
      REDIS_URL: redis://redis:6379/0

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
      - jupyter
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_NOTEBOOK_URL: http://localhost:8888
      NEXT_PUBLIC_NOTEBOOK_TOKEN: daqs2024

  jupyter:
    image: quay.io/jupyter/minimal-notebook:latest
    restart: unless-stopped
    ports:
      - "8888:8888"
    volumes:
      # Course notebooks are served directly from the Next.js public folder
      - ./frontend/public/notebooks:/home/jovyan/daqs-notebooks:ro
      # Persistent workspace for student work
      - jupyter_work:/home/jovyan/work
    environment:
      JUPYTER_ENABLE_LAB: "yes"
    command: >
      start-notebook.sh
      --ServerApp.token=daqs2024
      --ServerApp.allow_origin=*
      --ServerApp.disable_check_xsrf=true

volumes:
  postgres_data:
  redis_data:
  jupyter_work:
