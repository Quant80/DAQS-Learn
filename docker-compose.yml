version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: daqs
      POSTGRES_PASSWORD: daqs_password
      POSTGRES_DB: daqs_learn
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daqs"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://daqs:daqs_password@db:5432/daqs_learn
      REDIS_URL: redis://redis:6379/0

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_NOTEBOOK_URL: http://localhost:8888
      NEXT_PUBLIC_NOTEBOOK_TOKEN: daqs2024
      NEXT_PUBLIC_STUDIO_URL: http://localhost:8080
      NEXT_PUBLIC_LABS_URL: http://localhost:7681

  # ── Phase 5: DAQS Notebook ─────────────────────────────────────────────────
  notebook:
    image: quay.io/jupyter/scipy-notebook:latest
    restart: unless-stopped
    ports:
      - "8888:8888"
    volumes:
      - notebook_data:/home/jovyan/work
    environment:
      JUPYTER_TOKEN: "daqs2024"
      JUPYTER_ENABLE_LAB: "yes"
    command: >
      start-notebook.sh
      --ServerApp.token=daqs2024
      --ServerApp.allow_origin=*
      --ServerApp.tornado_settings={"headers":{"Content-Security-Policy":"frame-ancestors *"}}

  # ── Phase 6: DAQS Studio ───────────────────────────────────────────────────
  studio:
    image: codercom/code-server:latest
    restart: unless-stopped
    user: "1000"
    ports:
      - "8080:8080"
    volumes:
      - studio_data:/home/coder/project
    environment:
      PASSWORD: "daqs2024"
    command: >
      --bind-addr 0.0.0.0:8080
      --auth password
      /home/coder/project

  # ── Phase 7: Docker Labs ───────────────────────────────────────────────────
  labs:
    build:
      context: ./labs
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "7681:7681"
    volumes:
      - labs_workspace:/workspace

volumes:
  postgres_data:
  redis_data:
  notebook_data:
  studio_data:
  labs_workspace:
